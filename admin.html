<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学员管理 - 人工智能训练师考核系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 登录表单样式 */
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .login-box h1 span {
            font-size: 48px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .error-msg {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        /* 管理界面样式 */
        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .admin-header h1 {
            color: #333;
            font-size: 24px;
        }
        .logout-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 10px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area input {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-text span {
            color: #667eea;
            font-weight: bold;
        }
        .student-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        .student-info {
            display: flex;
            gap: 20px;
        }
        .student-name {
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }
        .student-id {
            color: #888;
            font-size: 14px;
        }
        .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .delete-btn:hover {
            background: #ffeaea;
        }
        .clear-btn {
            width: 100%;
            padding: 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
        }
        .clear-btn:hover {
            background: #c0392b;
        }
        .success-msg {
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
        
        .score-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .score-item:last-child {
            border-bottom: none;
        }
        
        .score-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .score-name {
            font-weight: bold;
            color: #333;
        }
        
        .score-meta {
            color: #888;
            font-size: 12px;
        }
        
        .score-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .score-pass {
            background: #c6f6d5;
            color: #276749;
        }
        
        .score-fail {
            background: #fed7d7;
            color: #c53030;
        }
        
        .score-id {
            color: #666;
            font-size: 12px;
            font-family: monospace;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- 老师登录表单 -->
    <div id="loginSection" class="login-box">
        <h1><span>🔐</span><br>管理员登录</h1>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>📋 账号</label>
                <input type="text" id="adminUsername" required placeholder="请输入管理员账号">
            </div>
            <div class="form-group">
                <label>🔐 密码</label>
                <input type="password" id="adminPassword" required placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn">登录管理后台</button>
            <p id="loginError" class="error-msg">账号或密码错误</p>
        </form>
        <div class="back-link">
            <a href="login.html">← 返回学员登录</a>
        </div>
    </div>

    <!-- 管理界面 -->
    <div id="adminSection" class="admin-container hidden">
        <div class="admin-header">
            <h1>📊 学员管理</h1>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>📋 总学员数</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>✅ 已导入学员</h3>
                <div class="number" id="importedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>🎯 做题人次</h3>
                <div class="number" id="attemptCount">0</div>
            </div>
            <div class="stat-card">
                <h3>📊 平均成绩</h3>
                <div class="number" id="avgScore">-</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📤 导入学员名单</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".csv,.xlsx">
                <div class="upload-icon">📁</div>
                <p class="upload-text">点击上传 CSV 文件<br><span>下载模板</span></p>
            </div>
            <p id="successMsg" class="success-msg">✅ 导入成功！</p>
        </div>
        
        <div class="section">
            <h2>👥 学员列表</h2>
            <div class="student-list" id="studentList">
                <p style="text-align:center;color:#999;padding:20px;">暂无学员数据</p>
            </div>
            <button class="clear-btn" onclick="clearAll()">🗑 清空所有学员</button>
        </div>

        <div class="section">
            <h2>📊 成绩管理</h2>
            <div class="upload-area" onclick="document.getElementById('scoreInput').click()" style="margin-bottom:15px;">
                <input type="file" id="scoreInput" accept=".json">
                <div class="upload-icon">📤</div>
                <p class="upload-text">点击导入学员成绩文件（JSON）<br><span>支持批量选择多个文件</span></p>
            </div>
            <div class="stats-grid">
                <div class="stat-card" style="background:linear-gradient(135deg,#48bb78,#38a169);">
                    <h3>📋 导入记录</h3>
                    <div class="number" id="scoreRecordCount">0</div>
                </div>
                <div class="stat-card" style="background:linear-gradient(135deg,#ed8936,#dd6b20);">
                    <h3>🏆 最高成绩</h3>
                    <div class="number" id="maxScore">-</div>
                </div>
                <div class="stat-card" style="background:linear-gradient(135deg,#4299e1,#3182ce);">
                    <h3>📝 总做题人次</h3>
                    <div class="number" id="totalAttempts">0</div>
                </div>
                <div class="stat-card" style="background:linear-gradient(135deg,#9f7aea,#805ad5);">
                    <h3>⭐ 平均成绩</h3>
                    <div class="number" id="avgScoreCard">-</div>
                </div>
            </div>
            <div class="score-list" id="scoreList">
                <p style="text-align:center;color:#999;padding:20px;">暂无成绩数据，请先导入学员的成绩文件</p>
            </div>
            <button class="clear-btn" style="background:#805ad5;" onclick="exportAllScores()">📥 导出全部成绩</button>
        </div>
        
        <footer>© 2026 上海立得职业技能培训有限公司</footer>
    </div>

    <script>
        // 老师账号配置
        const ADMIN_USERNAME = '310107198411110933';
        const ADMIN_PASSWORD = 'Shsgm3920';
        
        // 检查是否已登录
        const adminUser = localStorage.getItem('adminUser');
        if (adminUser === 'true') {
            showAdminPanel();
        }
        
        // 管理员登录
        document.getElementById('adminLoginForm').onsubmit = function(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('adminUser', 'true');
                showAdminPanel();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
            }
        };
        
        function showAdminPanel() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            showStats();
        }
        
        function logout() {
            localStorage.removeItem('adminUser');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }
        
        // 显示统计
        function showStats() {
            const students = JSON.parse(localStorage.getItem('exam_students') || '[]');
            document.getElementById('totalCount').textContent = students.length;
            document.getElementById('importedCount').textContent = students.length;

            // 统计做题人次和平均成绩（从 exam_score_xxx localStorage 读取）
            let attemptCount = 0;
            let totalScore = 0;
            let scoreCount = 0;
            for (let key in localStorage) {
                if (key.startsWith('exam_score_')) {
                    attemptCount++;
                    const score = parseFloat(localStorage.getItem(key));
                    if (!isNaN(score)) {
                        totalScore += score;
                        scoreCount++;
                    }
                }
            }
            
            // 加上导入的成绩
            const importedScores = JSON.parse(localStorage.getItem('exam_scores_imported') || '[]');
            importedScores.forEach(s => {
                if (s.score !== undefined) {
                    attemptCount++;
                    totalScore += s.score;
                    scoreCount++;
                }
            });
            
            document.getElementById('attemptCount').textContent = attemptCount;
            document.getElementById('avgScore').textContent = scoreCount > 0
                ? (totalScore / scoreCount).toFixed(1) + '分'
                : '-';

            showStudentList();
        }
        
        // 显示学员列表
        function showStudentList() {
            const students = JSON.parse(localStorage.getItem('exam_students') || '[]');
            const listEl = document.getElementById('studentList');
            
            if (students.length === 0) {
                listEl.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无学员数据</p>';
                return;
            }
            
            listEl.innerHTML = students.map((s, i) => `
                <div class="student-item">
                    <div class="student-info">
                        <span class="student-name">${s.name}</span>
                        <span class="student-id">${s.id}</span>
                    </div>
                    <span class="delete-btn" onclick="deleteStudent(${i})">删除</span>
                </div>
            `).join('');
        }
        
        // 删除单个学员
        function deleteStudent(index) {
            const students = JSON.parse(localStorage.getItem('exam_students') || '[]');
            students.splice(index, 1);
            localStorage.setItem('exam_students', JSON.stringify(students));
            showStats();
        }
        
        // 清空所有学员
        function clearAll() {
            if (confirm('确定要清空所有学员数据吗？')) {
                localStorage.removeItem('exam_students');
                showStats();
            }
        }
        
        // 文件上传
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const lines = text.split('\n').filter(line => line.trim());
                
                if (lines.length < 2) {
                    alert('CSV 文件格式错误，请确保包含表头和数据');
                    return;
                }
                
                // 跳过表头，解析数据
                const students = [];
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split(',').map(p => p.trim().replace(/"/g, ''));
                    if (parts.length >= 2) {
                        const name = parts[0];
                        const idCard = parts[1];
                        if (name && idCard && idCard.length >= 6) {
                            students.push({
                                id: idCard,
                                name: name
                            });
                        }
                    }
                }
                
                if (students.length > 0) {
                    // 合并到现有数据（去重）
                    const existing = JSON.parse(localStorage.getItem('exam_students') || '[]');
                    const existingIds = new Set(existing.map(s => s.id));
                    const newStudents = students.filter(s => !existingIds.has(s.id));
                    const allStudents = [...existing, ...newStudents];
                    localStorage.setItem('exam_students', JSON.stringify(allStudents));
                    
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('successMsg').style.display = 'none';
                    }, 3000);
                    
                    showStats();
                } else {
                    alert('未能解析到有效的学员数据');
                }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        };
        
        // ========== 成绩管理 ==========
        const SCORE_STORAGE_KEY = 'exam_scores_imported';
        
        function loadScores() {
            return JSON.parse(localStorage.getItem(SCORE_STORAGE_KEY) || '[]');
        }
        
        function saveScores(scores) {
            localStorage.setItem(SCORE_STORAGE_KEY, JSON.stringify(scores));
        }
        
        function showScoreStats() {
            const scores = loadScores();
            document.getElementById('scoreRecordCount').textContent = scores.length;
            document.getElementById('totalAttempts').textContent = scores.length;
            
            if (scores.length > 0) {
                const max = Math.max(...scores.map(s => s.score));
                document.getElementById('maxScore').textContent = max + '分';
                
                const avg = scores.reduce((a, b) => a + b.score, 0) / scores.length;
                document.getElementById('avgScoreCard').textContent = avg.toFixed(1) + '分';
            } else {
                document.getElementById('maxScore').textContent = '-';
                document.getElementById('avgScoreCard').textContent = '-';
            }
        }
        
        function renderScoreList() {
            const scores = loadScores();
            const listEl = document.getElementById('scoreList');
            
            if (scores.length === 0) {
                listEl.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无成绩数据，请先导入学员的成绩文件</p>';
                return;
            }
            
            // 按时间倒序排列
            scores.sort((a, b) => new Date(b.doneTime) - new Date(a.doneTime));
            
            listEl.innerHTML = scores.map((s, i) => {
                const passClass = s.score >= 12 ? 'score-pass' : 'score-fail';
                const passText = s.score >= 12 ? '合格' : '不合格';
                const dateStr = s.doneTime ? new Date(s.doneTime).toLocaleString('zh-CN') : '未知时间';
                return `
                    <div class="score-item">
                        <div class="score-info">
                            <span class="score-name">${s.studentName || '未知姓名'}</span>
                            <span class="score-id">${s.studentId || '未知身份证'}</span>
                            <span class="score-meta">题目：${s.questionId} | 完成时间：${dateStr}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span class="score-badge ${passClass}">${s.score}分 ${passText}</span>
                            <span class="delete-btn" onclick="deleteScore(${i})">删除</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function deleteScore(index) {
            if (!confirm('确定要删除这条成绩记录吗？')) return;
            const scores = loadScores();
            scores.splice(index, 1);
            saveScores(scores);
            showScoreStats();
            renderScoreList();
        }
        
        function exportAllScores() {
            const scores = loadScores();
            if (scores.length === 0) {
                alert('暂无成绩可导出');
                return;
            }
            
            const csvContent = '\uFEFF姓名,身份证号,题目,成绩,是否合格,完成时间\n' + 
                scores.map(s => {
                    const pass = s.score >= 12 ? '合格' : '不合格';
                    const date = s.doneTime ? new Date(s.doneTime).toLocaleString('zh-CN') : '未知';
                    return `${s.studentName || '未知'},${s.studentId || '未知'},${s.questionId},${s.score},${pass},${date}`;
                }).join('\n');
            
            const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `学员成绩汇总_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 成绩文件导入
        document.getElementById('scoreInput').onchange = function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            let imported = 0;
            let processed = 0;
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const record = JSON.parse(event.target.result);
                        
                        // 验证格式
                        if (record.studentName && record.questionId && typeof record.score === 'number') {
                            const scores = loadScores();
                            // 去重：同一学员同一题目只保留最新记录
                            const existingIndex = scores.findIndex(
                                s => s.studentId === record.studentId && s.questionId === record.questionId
                            );
                            
                            if (existingIndex >= 0) {
                                scores[existingIndex] = record;
                            } else {
                                scores.push(record);
                            }
                            
                            saveScores(scores);
                            imported++;
                        }
                    } catch (err) {
                        console.warn('解析失败:', file.name, err);
                    }
                    
                    processed++;
                    if (processed === files.length) {
                        showScoreStats();
                        renderScoreList();
                        alert(`成功导入 ${imported} 条成绩记录！`);
                    }
                };
                reader.readAsText(file, 'UTF-8');
            });
            
            e.target.value = '';
        };
        
        // 初始化时加载成绩
        showScoreStats();
        renderScoreList();
    </script>
</body>
</html>

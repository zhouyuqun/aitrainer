<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学员登录 - 人工智能训练师考核系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 90%;
            overflow: hidden;
        }
        
        .login-header {
            background: #2c5282;
            color: #fff;
            padding: 30px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .login-form {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2c5282;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #2c5282;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn:hover {
            background: #1a365d;
        }
        
        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #e2e8f0;
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                width: 95%;
            }
            .login-header {
                padding: 20px;
            }
            .login-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>👋 学员登录</h1>
            <p>人工智能训练师考核系统</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>📋 身份证号码（账号）</label>
                <input type="text" id="username" placeholder="请输入身份证号码" maxlength="18" required>
            </div>
            
            <div class="form-group">
                <label>🔐 密码（身份证后6位）</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="login-btn">登录考核系统</button>
            
            <div class="error-msg" id="errorMsg">身份证号或密码错误，请重试！</div>
        </form>
        
        <div class="footer">
            © 2026 上海立得职业技能培训有限公司
        </div>
    </div>

    <script>
        // 老师账号
        const ADMIN_ID = '310107198411110933';
        const ADMIN_PWD = 'Shsgm3920';
        
        // 加载学员名单（自动从 students.csv 读取）
        async function loadStudents() {
            try {
                const response = await fetch('students.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const students = [];
                for (let i = 1; i < lines.length; i++) { // 跳过表头
                    const parts = lines[i].split(',');
                    if (parts.length >= 2) {
                        students.push({ name: parts[0].trim(), id: parts[1].trim() });
                    }
                }
                localStorage.setItem('exam_students', JSON.stringify(students));
                console.log('已加载学员数据:', students.length, '人');
                return students;
            } catch (err) {
                console.error('加载学员数据失败:', err);
                return JSON.parse(localStorage.getItem('exam_students') || '[]');
            }
        }
        
        // 页面加载时获取学员数据
        loadStudents();
        
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const idCard = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();
            
            // 检查是否为老师账号
            if (idCard === ADMIN_ID && pwd === ADMIN_PWD) {
                // 老师登录成功
                localStorage.setItem('adminUser', 'true');
                localStorage.setItem('exam_logged_in', 'true');
                window.location.href = 'admin.html';
                return;
            }
            
            // 检查是否为学员账号
            const students = JSON.parse(localStorage.getItem('exam_students') || '[]');
            console.log('当前学员列表:', students);
            console.log('尝试登录:', idCard, pwd);
            
            const student = students.find(s => {
                const expectedPwd = s.id.slice(-6);
                return s.id === idCard && expectedPwd === pwd;
            });
            
            if (student) {
                // 学员登录成功
                localStorage.setItem('exam_logged_in', 'true');
                localStorage.setItem('exam_student_name', student.name);
                localStorage.setItem('exam_student_id', student.id);
                // 调试：验证存储是否成功
                console.log('登录成功，学生:', student.name);
                console.log('exam_logged_in 已设置为:', localStorage.getItem('exam_logged_in'));
                window.location.href = 'index.html';
            } else {
                // 登录失败
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('password').value = '';
            }
        };
    </script>
</body>
</html>
